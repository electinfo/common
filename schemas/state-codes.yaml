# --- Territories and federal district ---
# house_seats: 0 (non-voting delegates)
# senate_seats: 0 (no senators)
territories:
  DC: { fips: "11", name: "District of Columbia", house_seats: 0 }
  PR: { fips: "72", name: "Puerto Rico", house_seats: 0 }
  GU: { fips: "66", name: "Guam", house_seats: 0 }
  VI: { fips: "78", name: "Virgin Islands", house_seats: 0 }
  AS: { fips: "60", name: "American Samoa", house_seats: 0 }
  MP: { fips: "69", name: "Northern Mariana Islands", house_seats: 0 }

# --- Special pseudo-state ---
# Used for federal/nationwide entities (e.g. President, national parties)
special:
  US: { name: "United States" }

