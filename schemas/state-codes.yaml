# US State and Territory Codes
# Canonical mapping of 2-letter postal codes, FIPS codes, and full names.
#
# Used by:
#   - Pipeline layers for state code ↔ name lookups
#   - Census FIPS code conversion
#   - Frontend display
#   - House apportionment (political representation)

# --- States (50) ---
# code: 2-letter USPS postal abbreviation
# fips: 2-digit Census FIPS code
# name: full state name
# house_seats: 2020 Census apportionment (US House of Representatives)
states:
