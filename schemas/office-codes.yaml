# Political Office Code Mappings
# Canonical office type abbreviations used across the electinfo platform.
#
# Used by:
#   - Quicksilver layers to normalize office values from source data
#   - Gold layer to generate office_key and office_name
#   - Office entity resolution (UUID5 keys match on canonical code)
#   - Frontend display (code → name lookups)
#
# Office key format: {code} | {code}-{state} | {code}-{state}-{district}
#   Examples: P, S-CA, H-CA-12, GOV-TX, SS-WA-43

# --- Federal offices ---
# FEC standard single-letter codes
federal:
  P:
    name: "President of the United States"
    level: federal
    branch: executive
    has_state: false
    has_district: false
  S:
    name: "U.S. Senator"
    level: federal
    branch: legislative
    has_state: true
    has_district: false
  H:
    name: "U.S. Representative"
    level: federal
    branch: legislative
    has_state: true
    has_district: true

