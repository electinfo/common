# --- Alias mappings → canonical code ---
# Maps variant abbreviations and full office names to canonical codes.
# All alias keys are UPPER-CASED for case-insensitive matching.
# Pipeline code should UPPER(TRIM(value)) before lookup.
aliases:
  # --- Federal aliases ---
  PRESIDENT: P
  PRESIDENT OF THE UNITED STATES: P
  US PRESIDENT: P
  U.S. PRESIDENT: P

  SENATE: S
  US SENATE: S
  U.S. SENATE: S
  US SENATOR: S
  U.S. SENATOR: S
  UNITED STATES SENATOR: S
  UNITED STATES SENATE: S

  HOUSE: H
  US HOUSE: H
  U.S. HOUSE: H
  US REPRESENTATIVE: H
  U.S. REPRESENTATIVE: H
  UNITED STATES REPRESENTATIVE: H
  REPRESENTATIVE IN CONGRESS: H
  US CONGRESS: H
  U.S. CONGRESS: H

  # --- PA DOS abbreviations ---
  USC: H         # PA DOS "US Congress" — disambiguated by district presence
  LTG: LTGOV     # PA DOS Lieutenant Governor
  ATT: AG        # PA DOS Attorney General
  TRS: TREAS     # PA DOS Treasurer
  STH: SR        # PA DOS State House
  STS: SS        # PA DOS State Senate

  # --- OpenElections / general aliases ---
  SH: SR         # OpenElections "State House"

  # --- Full name → code (Governor variants) ---
  GOVERNOR: GOV
  LIEUTENANT GOVERNOR: LTGOV
  LT. GOVERNOR: LTGOV
  LT GOVERNOR: LTGOV

  # --- Full name → code (Attorney General) ---
  ATTORNEY GENERAL: AG

  # --- Full name → code (Secretary of State) ---
  SECRETARY OF STATE: SOS

  # --- Full name → code (Treasurer variants) ---
  TREASURER: TREAS
  STATE TREASURER: TREAS

  # --- Full name → code (Auditor variants) ---
  AUDITOR: AUD
  STATE AUDITOR: AUD

  # --- Full name → code (Comptroller) ---
  COMPTROLLER: COMP

  # --- Full name → code (Education) ---
  SUPERINTENDENT OF PUBLIC INSTRUCTION: SPI

  # --- Full name → code (Commissioners) ---
  COMMISSIONER OF PUBLIC LANDS: PLC
  PUBLIC LANDS COMMISSIONER: PLC
  INSURANCE COMMISSIONER: IC
  COMMISSIONER OF AGRICULTURE: AGCOM
  COMMISSIONER OF INSURANCE: INSCOM
  COMMISSIONER OF LABOR: LABCOM

  # --- Full name → code (State legislative) ---
  STATE SENATOR: SS
  STATE SENATE: SS
  SENATOR: SS

  STATE REPRESENTATIVE: SR
  STATE HOUSE: SR
  REPRESENTATIVE: SR
  STATE ASSEMBLY: SR
  ASSEMBLY: SR
  HOUSE OF DELEGATES: SR

  # --- Full name → code (Local) ---
  SHERIFF: SHER
  DISTRICT ATTORNEY: DA
  COUNTY COMMISSIONER: CC
  REGISTER OF PROBATE: RP
  REGISTER OF DEEDS: RD
