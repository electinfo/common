# --- Alias mappings → canonical FEC code ---
# Maps variant party values (full names, abbreviations, single letters,
# state-specific terms) to canonical FEC 3-letter codes.
#
# All alias keys are UPPER-CASE for case-insensitive matching.
# Pipeline code should UPPER(TRIM(value)) before lookup.
#
# Aliases that are identical to a canonical code (e.g. DEM→DEM) are
# intentionally omitted — code lookup should check `codes` first,
# then fall back to `aliases`.
aliases:
  # --- Democratic variants ---
  DEMOCRATIC: DEM
  DEMOCRAT: DEM
  DEMOCRATIC PARTY: DEM
  DEMOCRATIC-FARMER-LABOR: DFL
  DEM-FARMER-LABOR: DFL
  D: DEM

  # --- Republican variants ---
  REPUBLICAN: REP
  REPUBLICAN PARTY: REP
  R: REP

  # --- Libertarian variants ---
  LIBERTARIAN: LIB
  LIBERTARIAN PARTY: LIB
  L: LIB

  # --- Green variants ---
  GREEN: GRE
  GREEN PARTY: GRE
  GRN: GRE
  G: GRE

  # --- Independent / Nonpartisan variants ---
  INDEPENDENT: IND
  NO PARTY AFFILIATION: NPA
  NO PARTY: NPA
  NON-PARTISAN: NON
  NONPARTISAN: NON
  NON PARTISAN: NON
  NP: NON
  UNAFFILIATED: NPA
  UNENROLLED: NPA
  I: IND
  N: NON

  # --- Constitution Party variants ---
  CONSTITUTION: CON
  CONSTITUTION PARTY: CON
  CONSTITUTIONAL: CST

  # --- Conservative variants ---
  CONSERVATIVE: CRV
  CONSERVATIVE PARTY: CRV

  # --- Reform Party variants ---
  REFORM: REF
  REFORM PARTY: REF

  # --- Working Families variants ---
  WORKING FAMILIES: WFP
  WORKING FAMILIES PARTY: WFP

  # --- Progressive variants ---
  PROGRESSIVE: PRO
  PROGRESSIVE PARTY: PRO

  # --- Write-in / Other ---
  WRITE-IN: OTH
  WRITE IN: OTH
  W: OTH
  OTHER: OTH
  UNKNOWN: UNK
  NONE: NON

  # --- State-specific affiliations ---
  # Minnesota
  DEMOCRATIC-FARMER-LABOR PARTY: DFL
  FARMER-LABOR: DFL

  # New York
  LIBERAL: LBL
  LIBERAL PARTY: LBL
  RIGHT TO LIFE: RTL
  RIGHT TO LIFE PARTY: RTL

  # Vermont
  LIBERTY UNION: LBU
  LIBERTY UNION PARTY: LBU

  # Puerto Rico
  POPULAR DEMOCRATIC: PPD
  PARTIDO POPULAR DEMOCRATICO: PPD

  # Alaska
  ALASKAN INDEPENDENCE: AKI
  ALASKAN INDEPENDENCE PARTY: AKI

  # Peace and Freedom
  PEACE AND FREEDOM: PAF
  PEACE AND FREEDOM PARTY: PFP

  # Socialist variants
  SOCIALIST: SOC
  SOCIALIST PARTY: SOC

  # Communist
  COMMUNIST: COM
  COMMUNIST PARTY: COM
