# Party Code Mappings
# Canonical party codes from the FEC Party Code Descriptions
# Reference: https://www.fec.gov/campaign-finance-data/party-code-descriptions/
#
# Used by:
#   - Pipeline quicksilver/gold layers to normalize party values
#   - Party entity resolution (UUID5 keys match on canonical code)
#   - Frontend display (code → name lookups)

# --- Canonical FEC party codes → full names ---
