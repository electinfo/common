apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: common-sbt-publish
  namespace: tekton-pipelines
spec:
  description: Build and publish Scala artifacts to Nexus using sbt publish
  workspaces:
    - name: source
      description: Workspace containing the source code
  steps:
    - name: publish
      image: sbtscala/scala-sbt:eclipse-temurin-21.0.5_11_1.10.6_3.6.2
      workingDir: $(workspaces.source.path)
      env:
        - name: JAVA_OPTS
          value: "-Xmx4g -Xms1g"
        - name: IVY_HOME
          value: /tmp/.ivy2
        - name: NEXUS_USER
          valueFrom:
            secretKeyRef:
              name: nexus-credentials
              key: username
        - name: NEXUS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nexus-credentials
              key: password
      script: |
        #!/bin/bash
        set -e

        echo "=== Publishing to Nexus ==="
        echo "Working directory: $(pwd)"

        # Determine snapshot vs release repo from version
        VERSION=$(grep -m1 'version :=' build.sbt | sed 's/.*"\(.*\)".*/\1/')
        ORG=$(grep -m1 'organization :=' build.sbt | sed 's/.*"\(.*\)".*/\1/')
        NAME=$(grep -m1 'name :=' build.sbt | sed 's/.*"\(.*\)".*/\1/')

        NEXUS_INTERNAL="http://nexus-nexus-repository-manager.nexus.svc.cluster.local:8081/repository"
        if echo "$VERSION" | grep -q SNAPSHOT; then
          REPO_URL="${NEXUS_INTERNAL}/maven-snapshots/"
        else
          REPO_URL="${NEXUS_INTERNAL}/maven-releases/"
        fi

        # Create SBT credentials for internal Nexus URL
        mkdir -p ~/.sbt/1.0
        cat > ~/.sbt/1.0/credentials.sbt << EOF
        credentials += Credentials(
          "Sonatype Nexus Repository Manager",
          "nexus-nexus-repository-manager.nexus.svc.cluster.local",
          "$NEXUS_USER",
          "$NEXUS_PASSWORD"
        )
        EOF

        # Override publishTo with internal cluster URL (bypasses Traefik/TLS)
        cat > publish-override.sbt << SEOF
        publishTo := Some(("Nexus" at "$REPO_URL").withAllowInsecureProtocol(true))
        SEOF

        echo "Credentials configured for internal Nexus"
        echo "Publishing: $ORG:$NAME:$VERSION -> $REPO_URL"

        # Run sbt publish
        sbt publish

        echo "=== Publish Complete ==="
        echo "Artifact: $ORG:$NAME:$VERSION"
