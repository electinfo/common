apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: common-pypi-publish
  namespace: tekton-pipelines
spec:
  description: Build and publish Python package to Nexus PyPI registry
  params:
    - name: snapshot
      type: string
      default: "false"
      description: "Set to 'true' to publish to pypi-snapshots, 'false' for pypi-hosted (releases)"
    - name: package-dir
      type: string
      default: "."
      description: "Subdirectory containing pyproject.toml (relative to workspace root)"
  workspaces:
    - name: source
      description: Workspace containing the source code
  steps:
    - name: publish
      image: python:3.12-slim
      workingDir: $(workspaces.source.path)/$(params.package-dir)
      env:
        - name: NEXUS_USER
          valueFrom:
            secretKeyRef:
              name: nexus-credentials
              key: username
        - name: NEXUS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nexus-credentials
              key: password
        - name: SNAPSHOT
          value: $(params.snapshot)
      script: |
        #!/bin/bash
        set -e

        echo "=== Installing build tools ==="
        pip install build twine

        echo "=== Building Python package ==="
        python -m build

        if [ "${SNAPSHOT}" = "true" ]; then
          REPO_NAME="pypi-snapshots"
        else
          REPO_NAME="pypi-hosted"
        fi
        REPO_URL="http://nexus-nexus-repository-manager.nexus.svc.cluster.local:8081/repository/${REPO_NAME}/"

        echo "=== Publishing to ${REPO_NAME} ==="
        twine upload \
          --repository-url "${REPO_URL}" \
          --username "${NEXUS_USER}" \
          --password "${NEXUS_PASSWORD}" \
          dist/*.tar.gz dist/*.whl

        echo "=== PyPI publish complete ==="
